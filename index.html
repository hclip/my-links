<!DOCTYPE html>
<html>
<head>
    <title>URL Director</title>
    <script>
        // Dictionary of your links
        cconst links = {
        "google": "https://www.croxyproxy.com/_proxy/php/direct.php?url=https://www.google.com",
        "search": "https://www.blockaway.net/_proxy/php/direct.php?url=https://www.duckduckgo.com"
        };

        // Check the URL for a 'go' parameter (e.g., ?go=google)
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('go');

        if (target && links[target]) {
            window.location.href = links[target];
        }
    </script>
</head>
<body>
    <h1>My URL Director</h1>
    <p>Use <code>?go=name</code> to redirect, or click below:</p>
    
    <ul>
        <li><a href="?go=google">Google</a></li>
        <li><a href="?go=studio">AI Studio</a></li>
        
        <li><a href="https://hyperbeam.com/app">Open Virtual Stealth Browser</a></li>
    </ul>

</body>
</html>
